<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs - Rohan Sharma</title>
    <style>
        body {
            font-family: serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            line-height: 1.4;
        }
        h1 {
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        a {
            color: inherit;
        }
        .post {
            margin: 20px 0;
            padding-bottom: 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .post:last-of-type {
            border-bottom: none;
        }
        .post a {
            font-size: 1.1em;
        }
        .post p {
            margin: 4px 0 0;
            color: #666;
            font-size: 0.95em;
        }
        .coming-soon {
            margin-top: 40px;
            padding: 20px 0;
            color: #888;
            font-style: italic;
        }
        .back {
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>
    <a href="/" class="back">&larr; back</a>
    <h1>Blogs</h1>

    <p class="coming-soon">Interesting things coming soon.</p>
</body>
</html>
